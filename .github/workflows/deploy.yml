name: Build and Deploy to GitHub Pages

on:
  # 仅在推送到 main 分支时触发部署
  push:
    branches: [ "main" ]
  # 为 PR 创建预览构建
  pull_request:
    branches: [ "main" ]

# 允许一个并发的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建和部署作业（仅在 main 分支推送时执行）
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v4
      continue-on-error: true

    # 检查 Pages 是否已配置
    - name: Check Pages setup
      run: |
        if [ "${{ steps.pages.outcome }}" == "failure" ]; then
          echo "❌ GitHub Pages 未正确配置"
          echo "请在仓库设置中启用 GitHub Pages："
          echo "1. 进入仓库 Settings"
          echo "2. 找到 Pages section"
          echo "3. Source 选择 'GitHub Actions'"
          echo "4. 保存设置"
          exit 1
        else
          echo "✅ GitHub Pages 配置成功"
        fi

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
